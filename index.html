<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taku — Competency Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f1117; --card:#1a1d27; --card2:#20232f; --card3:#252837;
  --accent:#6c7bff; --accent2:#4fd1c5; --green:#48bb78;
  --yellow:#f6ad55; --red:#fc8181; --text:#e2e8f0; --muted:#718096;
  --border:#2d3148; --drawer:360px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}

/* ─── Layout shell ─── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.top-area{flex-shrink:0}
.body-area{display:flex;flex:1;overflow:hidden}
.main-scroll{flex:1;overflow-y:auto;padding-bottom:40px}

/* ─── Header ─── */
.header{background:linear-gradient(135deg,#1a1d27,#16192a);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.3rem;font-weight:700}.header h1 span{color:var(--accent)}
.header p{color:var(--muted);font-size:0.8rem;margin-top:3px}
.badges{display:flex;gap:10px}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:0.75rem;color:var(--muted)}
.badge.active{border-color:var(--accent);color:var(--accent)}

/* ─── KPI ─── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:18px 32px 0}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 20px}
.kpi-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:1.8rem;font-weight:700;margin-top:5px}
.kpi-sub{font-size:0.72rem;color:var(--muted);margin-top:3px}
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;margin-top:5px}
.chip.g{background:rgba(72,187,120,.15);color:var(--green)}
.chip.y{background:rgba(246,173,85,.15);color:var(--yellow)}
.chip.r{background:rgba(252,129,129,.15);color:var(--red)}

/* ─── Charts row ─── */
.charts-row{display:grid;grid-template-columns:1fr 1.5fr;gap:16px;padding:18px 32px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:20px}
.card-title{font-size:0.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
.cat-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.cat-name{font-size:0.75rem;width:200px;flex-shrink:0}
.bar-track{flex:1;background:var(--card2);border-radius:3px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .8s ease}
.cat-score{font-size:0.78rem;font-weight:600;width:28px;text-align:right;flex-shrink:0}

/* ─── Trend ─── */
.trend-wrap{padding:16px 32px 0}

/* ─── Competency grid ─── */
.section-hdr{padding:20px 32px 10px;display:flex;align-items:baseline;gap:16px}
.section-hdr h2{font-size:.9rem;font-weight:600}
.section-hdr p{font-size:.75rem;color:var(--muted)}
.comp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 32px 0}

.comp-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px 15px;cursor:pointer;transition:border-color .15s,transform .1s;
  position:relative;
}
.comp-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.comp-card.active{border-color:var(--accent);background:var(--card3)}
.comp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.comp-name{font-size:.8rem;font-weight:600;line-height:1.3;flex:1}
.comp-src{font-size:.62rem;padding:2px 6px;border-radius:3px;flex-shrink:0;margin-left:6px;margin-top:1px}
.src-ppt{background:rgba(108,123,255,.15);color:#9ba8ff}
.src-lom{background:rgba(79,209,197,.15);color:#4fd1c5}
.src-both{background:rgba(246,173,85,.15);color:#f6ad55}
.comp-cat{font-size:.65rem;color:var(--muted);margin-bottom:8px}
.score-row{display:flex;align-items:center;gap:7px}
.score-track{flex:1;background:var(--card2);border-radius:3px;height:4px;overflow:hidden}
.score-fill{height:100%;border-radius:3px}
.score-num{font-size:.8rem;font-weight:700;width:26px;text-align:right;flex-shrink:0}
.q-dots{display:flex;gap:4px;margin-top:8px}
.q-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700}
.q-dot.scored{background:rgba(108,123,255,.2);color:var(--accent);border:1px solid var(--accent)}
.q-dot.empty{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.has-note::after{content:'📝';position:absolute;top:8px;right:8px;font-size:.6rem}

/* ─── Detail Drawer ─── */
.drawer{
  width:var(--drawer);flex-shrink:0;background:var(--card);
  border-left:1px solid var(--border);overflow-y:auto;
  transition:width .25s ease,opacity .25s ease;
  display:flex;flex-direction:column;
}
.drawer.closed{width:0;opacity:0;overflow:hidden;border:none}
.drawer-inner{padding:24px 20px;min-width:var(--drawer)}
.drawer-close{
  display:flex;justify-content:flex-end;margin-bottom:16px
}
.close-btn{
  background:var(--card2);border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:4px 10px;cursor:pointer;font-size:.75rem;
}
.close-btn:hover{color:var(--text);border-color:var(--accent)}
.drawer-name{font-size:1.1rem;font-weight:700;margin-bottom:4px}
.drawer-cat{font-size:.72rem;color:var(--muted);margin-bottom:14px}
.score-big{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.score-circle{
  width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;font-weight:700;
  border:3px solid var(--border);flex-shrink:0;
}
.score-label{font-size:.72rem;color:var(--muted)}
.score-label strong{display:block;font-size:.85rem;color:var(--text)}
.section-tag{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--accent2);margin:14px 0 7px}
.def-en{font-size:.78rem;line-height:1.7;color:#a0aec0;font-style:italic}
.def-jp{font-size:.78rem;line-height:1.7;color:var(--text);margin-top:8px;padding:10px 12px;background:var(--card2);border-radius:7px;border-left:3px solid var(--accent)}
.src-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:.72rem;margin-top:6px}
.next-action-area{margin-top:6px}
.next-action-box{
  width:100%;background:var(--card2);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:.78rem;padding:9px 11px;
  resize:none;font-family:inherit;line-height:1.6;min-height:70px;
}
.next-action-box:focus{outline:none;border-color:var(--accent)}
.q-history{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.q-hist-item{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:7px 11px;font-size:.72rem;min-width:70px;text-align:center}
.q-hist-item .q-period{color:var(--muted);margin-bottom:3px}
.q-hist-item .q-val{font-size:1rem;font-weight:700}
.notion-link{display:inline-flex;align-items:center;gap:5px;margin-top:14px;font-size:.72rem;color:var(--muted);text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:6px;transition:color .15s,border-color .15s}
.notion-link:hover{color:var(--accent);border-color:var(--accent)}

/* ─── Divider ─── */
.divider{height:1px;background:var(--border);margin:14px 0}
</style>
</head>

    jp:"孤立しても自分の立場を守れる。圧力に屈せず、信じる意見を一人でも主張できる。勇気ある単独行動ができる。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea08140a178dbf2cd3fe481" },

  { name:"Managerial Courage", cat:"Personal", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Doesn't hold back anything that needs to be said; provides current, direct, complete, and 'actionable' positive and corrective feedback to others; lets people know where they stand.",
    jp:"言うべきことを言える勇気がある。フィードバックを直接的かつ建設的に届ける。相手が自分の立ち位置を分かるよう伝える。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081a3826ff88fb7ff0e51" },

  // ── Strategic Thinking & Business Acumen ──
  { name:"Creativity", cat:"Strategic", src:"both",
    s_2025_10:70, q1:null, q2:null, q3:null, q4:null,
    en:"Comes up with a lot of new and unique ideas; easily makes connections among previously unrelated notions; tends to be seen as original and value-added in brainstorming settings.",
    jp:"既存の枠にとらわれず発想できる。離れた点をつなげ、新しい価値を生む。アイデア出しの場で存在感を発揮しやすい。実行可能性まで含めて形にしていく。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081948643fe5d241baa29" },

  { name:"Perspective", cat:"Strategic", src:"lominger",
    s_2025_10:70, q1:null, q2:null, q3:null, q4:null,
    en:"Looks toward the broadest possible view of an issue/challenge; has broad-ranging personal and business interests and pursuits; can easily pose future scenarios; can discuss multiple aspects and impacts of issues.",
    jp:"最も広い視点でイシューを捉える。グローバルに考え、複数の側面と将来への影響を語れる。将来シナリオを描く力がある。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081c79b68c057e181f521" },

  { name:"Strategic Thinking", cat:"Strategic", src:"ppt",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Accurately anticipates future consequences and trends; has broad knowledge and perspective; is future oriented; can create competitive and breakthrough strategies.",
    jp:"将来のトレンドを先読みし、戦略を描く。競合優位につながる突破口を見つける。18ヶ月以上先を意識した思考ができる。",
    nextAction:"", notionUrl:"" },

  { name:"Innovation Mgmt", cat:"Strategic", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Is good at bringing the creative ideas of others to market; has good judgment about which creative ideas and suggestions will work; can project how potential ideas may play out in the marketplace.",
    jp:"創造的なアイデアを市場に届ける力がある。どのアイデアが機能するかを見極め、実装まで導く。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081c0b065e70f03362158" },

  { name:"Customer Focus", cat:"Strategic", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Is dedicated to meeting the expectations and requirements of internal and external customers; acts with customers in mind; establishes and maintains effective relationships with customers.",
    jp:"顧客の期待と要件を満たすことへの献身がある。顧客を常に念頭に置いて行動する。有効な関係を築き続ける。",
    nextAction:"", notionUrl:"" },

  // ── Cognitive & Learning Agility ──
  { name:"Intellectual Horsepower", cat:"Cognitive", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Is bright and intelligent; deals with concepts and complexity comfortably; described as intellectually sharp, capable, and agile.",
    jp:"知的な処理能力が高い。複雑な概念もすっきり整理できる。鋭く、素早く、柔軟な思考が特徴。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081a78bfedaffec18104b" },

  { name:"Dealing w/ Ambiguity", cat:"Cognitive", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Can effectively cope with change; can shift gears comfortably; can decide and act without having the total picture; isn't upset when things are up in the air.",
    jp:"変化に対応し、不完全な情報の中でも決断できる。曖昧さを受け入れ、行動に移せる。不確実な状況でも動揺しない。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081429174f43f086bcf97" },

  { name:"Problem Solving", cat:"Cognitive", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Uses rigorous logic and methods to solve difficult problems with effective solutions; probes all fruitful sources for answers; can see hidden problems; is excellent at honest analysis.",
    jp:"論理的に問題を解き、有効な解を導く。真因を探り、隠れた問題も見抜く。誠実な分析力がある。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081458924dccfa81b7ff5" },

  { name:"Technical Learning", cat:"Cognitive", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Picks up on technical things quickly; can learn new skills and knowledge; is good at learning new industry, company, product, or technical knowledge.",
    jp:"新しい技術を素早く習得できる。業界・製品・技術知識を継続的にアップデートする。学習速度そのものが競争力になる。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea0813c98bfc3065fb0f5c5" },

  { name:"Functional/Tech Skills", cat:"Cognitive", src:"both",
    s_2025_10:null, q1:null, q2:null, q3:null, q4:null,
    en:"Has the functional and technical knowledge and skills to do the job at a high level of accomplishment; demonstrates active interest in acquiring new technical knowledge.",
    jp:"職能上の技術・知識を高いレベルで保有する。常に新しい技術知識を積極的に学ぼうとする姿勢がある。",
    nextAction:"", notionUrl:"https://www.notion.so/290cdd87cea081d2bb49d0bb522e8909" },
];

const CATEGORIES = {
  Execution:    { label:"Execution & Results",       color:"#f6ad55" },
  Leadership:   { label:"People Leadership & Dev",   color:"#68d391" },
  Interpersonal:{ label:"Interpersonal & Comm",      color:"#76e4f7" },
  Personal:     { label:"Personal Effectiveness",    color:"#b794f4" },
  Strategic:    { label:"Strategic Thinking",        color:"#fc8181" },
  Cognitive:    { label:"Cognitive & Learning",      color:"#90cdf4" },
};
</script>

<!-- ─── HTML ─── -->
<div class="app">
  <div class="top-area">
    <!-- Header -->
    <div class="header">
      <div>
        <h1><span id="hdrName"></span> — Competency Dashboard</h1>
        <p>Lominger × PM Session 統合トラッカー ｜ クリックで詳細を表示</p>
      </div>
      <div class="badges">
        <div class="badge active" id="hdrLast"></div>
        <div class="badge" id="hdrNext"></div>
      </div>
    </div>
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">採点済み</div>
        <div class="kpi-value" id="kpiScored" style="color:var(--accent)">—</div>
        <div class="kpi-sub" id="kpiScoredSub"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">平均スコア</div>
        <div class="kpi-value" id="kpiAvg" style="color:var(--green)">—</div>
        <div class="kpi-sub">採点済みベース</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">最強カテゴリ</div>
        <div class="kpi-value" id="kpiTop" style="color:var(--yellow);font-size:1rem;margin-top:8px">—</div>
        <div class="chip y" id="kpiTopSc"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">伸び代カテゴリ</div>
        <div class="kpi-value" id="kpiLow" style="color:var(--red);font-size:1rem;margin-top:8px">—</div>
        <div class="chip r" id="kpiLowSc"></div>
      </div>
    </div>
  </div>

  <div class="body-area">
    <!-- Scrollable main -->
    <div class="main-scroll">
      <!-- Charts -->
      <div class="charts-row" style="margin-top:16px">
        <div class="card">
          <div class="card-title">Radar — カテゴリ別強み</div>
          <canvas id="radarChart" height="260"></canvas>
        </div>
        <div class="card">
          <div class="card-title">カテゴリ平均スコア</div>
          <div id="catBars"></div>
        </div>
      </div>
      <!-- Trend -->
      <div class="trend-wrap" style="margin-top:16px">
        <div class="card">
          <div class="card-title">四半期トレンド（2026）</div>
          <canvas id="trendChart" height="80"></canvas>
        </div>
      </div>
      <!-- Competency cards -->
      <div class="section-hdr">
        <h2>コンピテンシー一覧</h2>
        <p><span style="color:#9ba8ff">■ PPT</span>&nbsp;<span style="color:#4fd1c5">■ Lominger</span>&nbsp;<span style="color:#f6ad55">■ 両方</span>&nbsp;｜ カードをクリックで詳細</p>
      </div>
      <div class="comp-grid" id="compGrid"></div>
      <div style="height:24px"></div>
    </div>

    <!-- Detail Drawer -->
    <div class="drawer closed" id="drawer">
      <div class="drawer-inner">
        <div class="drawer-close">
          <button class="close-btn" onclick="closeDrawer()">✕ 閉じる</button>
        </div>
        <div class="drawer-name" id="dName"></div>
        <div class="drawer-cat" id="dCat"></div>
        <div class="score-big">
          <div class="score-circle" id="dScoreCircle">—</div>
          <div>
            <div class="score-label">2025.10 スコア<strong id="dScoreLabel">未採点</strong></div>
            <div id="dSrcBadge"></div>
          </div>
        </div>

        <div class="divider"></div>
        <div class="section-tag">Definition（英語）</div>
        <div class="def-en" id="dEn"></div>

        <div class="section-tag">内省的解釈（日本語）</div>
        <div class="def-jp" id="dJp"></div>

        <div class="divider"></div>
        <div class="section-tag">スコア履歴</div>
        <div class="q-history" id="dHistory"></div>

        <div class="divider"></div>
        <div class="section-tag">Next Action（メモ）</div>
        <div class="next-action-area">
          <textarea class="next-action-box" id="dNextAction" placeholder="次の四半期に向けて..." rows="3"></textarea>
        </div>
        <div id="dNotionLink"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Init ──────────────────────────────────────────────────
document.getElementById('hdrName').textContent = PROFILE.name;
document.getElementById('hdrLast').textContent = '最終更新: ' + PROFILE.lastUpdated;
document.getElementById('hdrNext').textContent = '次回レビュー: ' + PROFILE.nextReview;

const scoreColor = s => !s ? '#4a5568' : s>=80 ? '#48bb78' : s>=70 ? '#f6ad55' : '#fc8181';

const scored = COMPETENCIES.filter(c=>c.s_2025_10!==null);
const avg = scored.length ? Math.round(scored.reduce((a,c)=>a+c.s_2025_10,0)/scored.length) : 0;
document.getElementById('kpiScored').textContent = scored.length;
document.getElementById('kpiScoredSub').textContent = `全${COMPETENCIES.length}中`;
document.getElementById('kpiAvg').textContent = avg;

const catScores = {};
Object.keys(CATEGORIES).forEach(k=>{
  const sc = COMPETENCIES.filter(c=>c.cat===k&&c.s_2025_10!==null);
  catScores[k] = sc.length ? Math.round(sc.reduce((a,c)=>a+c.s_2025_10,0)/sc.length) : null;
});
const validCats = Object.entries(catScores).filter(([,v])=>v!==null).sort((a,b)=>b[1]-a[1]);
if(validCats.length){
  document.getElementById('kpiTop').textContent = CATEGORIES[validCats[0][0]].label;
  document.getElementById('kpiTopSc').textContent = `avg ${validCats[0][1]}`;
  document.getElementById('kpiLow').textContent = CATEGORIES[validCats.at(-1)[0]].label;
  document.getElementById('kpiLowSc').textContent = `avg ${validCats.at(-1)[1]}`;
}

// ── Category bars ──────────────────────────────────────────
const barsEl = document.getElementById('catBars');
Object.entries(CATEGORIES).forEach(([k,cfg])=>{
  const sc = catScores[k];
  barsEl.innerHTML += `<div class="cat-row">
    <div class="cat-name">${cfg.label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${sc||0}%;background:${cfg.color}"></div></div>
    <div class="cat-score" style="color:${cfg.color}">${sc??'—'}</div>
  </div>`;
});

// ── Radar ──────────────────────────────────────────────────
new Chart(document.getElementById('radarChart'),{
  type:'radar',
  data:{
    labels: Object.values(CATEGORIES).map(c=>c.label.split(' ').slice(0,2).join('\n')),
    datasets:[{
      label:'2025.10', data: Object.keys(CATEGORIES).map(k=>catScores[k]||0),
      backgroundColor:'rgba(108,123,255,0.15)', borderColor:'#6c7bff', borderWidth:2,
      pointBackgroundColor: Object.values(CATEGORIES).map(c=>c.color), pointRadius:5,
    }]
  },
  options:{
    responsive:true,
    scales:{r:{min:0,max:100,ticks:{stepSize:20,color:'#718096',backdropColor:'transparent',font:{size:9}},
      grid:{color:'#2d3148'},angleLines:{color:'#2d3148'},pointLabels:{color:'#e2e8f0',font:{size:9}}}},
    plugins:{legend:{display:false}}
  }
});

// ── Trend ──────────────────────────────────────────────────
const tKeys = ['s_2025_10','q1','q2','q3','q4'];
const tLabels = ['2025.10','2026 Q1','2026 Q2','2026 Q3','2026 Q4'];
new Chart(document.getElementById('trendChart'),{
  type:'line',
  data:{
    labels:tLabels,
    datasets: Object.keys(CATEGORIES).map((k,i)=>({
      label:CATEGORIES[k].label,
      data:tKeys.map(tk=>{const s=COMPETENCIES.filter(c=>c.cat===k&&c[tk]!==null);return s.length?Math.round(s.reduce((a,c)=>a+c[tk],0)/s.length):null}),
      borderColor:Object.values(CATEGORIES)[i].color,
      backgroundColor:Object.values(CATEGORIES)[i].color+'33',
      borderWidth:2,pointRadius:4,tension:0.3,spanGaps:false,
    }))
  },
  options:{
    responsive:true,interaction:{mode:'index',intersect:false},
    scales:{y:{min:0,max:100,grid:{color:'#2d3148'},ticks:{color:'#718096',stepSize:20}},x:{grid:{color:'#2d3148'},ticks:{color:'#718096'}}},
    plugins:{legend:{labels:{color:'#e2e8f0',font:{size:10},boxWidth:10,padding:12}},tooltip:{backgroundColor:'#1a1d27',titleColor:'#e2e8f0',bodyColor:'#a0aec0',borderColor:'#2d3148',borderWidth:1}}
  }
});

// ── Comp cards ─────────────────────────────────────────────
const grid = document.getElementById('compGrid');
const srcLabel = s => s==='ppt'?['PPT','src-ppt']:s==='lominger'?['Lominger','src-lom']:['両方','src-both'];

COMPETENCIES.forEach((c,i)=>{
  const [sl,sc] = srcLabel(c.src);
  const s = c.s_2025_10;
  const col = scoreColor(s);
  const qs = [c.q1,c.q2,c.q3,c.q4];
  const div = document.createElement('div');
  div.className = 'comp-card' + (c.nextAction?'has-note':'');
  div.dataset.idx = i;
  div.innerHTML = `
    <div class="comp-top">
      <div class="comp-name">${c.name}</div>
      <span class="comp-src ${sc}">${sl}</span>
    </div>
    <div class="comp-cat">${CATEGORIES[c.cat]?.label}</div>
    <div class="score-row">
      <div class="score-track"><div class="score-fill" style="width:${s||0}%;background:${col}"></div></div>
      <div class="score-num" style="color:${col}">${s??'—'}</div>
    </div>
    <div class="q-dots">
      ${qs.map((q,qi)=>`<div class="q-dot ${q!==null?'scored':'empty'}" title="2026 Q${qi+1}: ${q??'未採点'}">${q??`Q${qi+1}`}</div>`).join('')}
    </div>`;
  div.addEventListener('click',()=>openDrawer(i,div));
  grid.appendChild(div);
});

// ── Drawer ─────────────────────────────────────────────────
let activeCard = null;
let activeIdx = null;

function openDrawer(idx, cardEl){
  if(activeCard){ activeCard.classList.remove('active'); }
  if(activeIdx===idx){ closeDrawer(); return; }
  activeCard = cardEl; activeIdx = idx;
  cardEl.classList.add('active');

  const c = COMPETENCIES[idx];
  const s = c.s_2025_10;
  const col = scoreColor(s);
  const [sl,sc] = srcLabel(c.src);

  document.getElementById('dName').textContent = c.name;
  document.getElementById('dCat').textContent = CATEGORIES[c.cat]?.label + ' ｜ ' + sl;
  const circle = document.getElementById('dScoreCircle');
  circle.textContent = s??'—';
  circle.style.borderColor = col; circle.style.color = col;
  document.getElementById('dScoreLabel').textContent = s ? `${s} 点` : '未採点';
  document.getElementById('dSrcBadge').innerHTML = `<span class="comp-src ${sc}" style="margin-top:4px">${sl}</span>`;
  document.getElementById('dEn').textContent = c.en || '（説明未登録）';
  document.getElementById('dJp').textContent = c.jp || '（日本語訳未登録）';

  const hist = [
    {period:'2025.10', val:c.s_2025_10},
    {period:'2026 Q1', val:c.q1},
    {period:'2026 Q2', val:c.q2},
    {period:'2026 Q3', val:c.q3},
    {period:'2026 Q4', val:c.q4},
  ];
  document.getElementById('dHistory').innerHTML = hist.map(h=>`
    <div class="q-hist-item">
      <div class="q-period">${h.period}</div>
      <div class="q-val" style="color:${scoreColor(h.val)}">${h.val??'—'}</div>
    </div>`).join('');

  const ta = document.getElementById('dNextAction');
  ta.value = c.nextAction || '';
  ta.oninput = ()=>{ COMPETENCIES[idx].nextAction = ta.value; };

  document.getElementById('dNotionLink').innerHTML = c.notionUrl
    ? `<a class="notion-link" href="${c.notionUrl}" target="_blank">🔗 Notion で開く</a>`
    : '';

  document.getElementById('drawer').classList.remove('closed');
  cardEl.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDrawer(){
  document.getElementById('drawer').classList.add('closed');
  if(activeCard) activeCard.classList.remove('active');
  activeCard = null; activeIdx = null;
}
</script>
</body>
</html>
